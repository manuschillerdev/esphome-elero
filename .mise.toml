[tools]
python = "3.11"
node = "lts"
pnpm = "latest"
uv = "latest"
cmake = "latest"
gitleaks = "latest"
"pipx:pre-commit" = "latest"

[vars]
usb_port = "/dev/cu.usbmodem2101"
device_ip = "10.0.0.4"

# --- Setup tasks (run once, idempotent) ---

[tasks."setup:python"]
description = "Install Python dependencies"
run = "uv sync"

[tasks."setup:frontend"]
description = "Install frontend dependencies"
run = "cd components/elero_web/frontend/app && pnpm install"

[tasks."setup:hooks"]
description = "Install git hooks"
run = "pre-commit install"

[tasks.setup]
description = "Install all project dependencies"
depends = ["setup:python", "setup:frontend", "setup:hooks"]

# --- Build tasks ---

[tasks."frontend:build"]
description = "Build frontend for embedding"
depends = ["setup:frontend"]
dir = "components/elero_web/frontend/app"
run = "pnpm build"

[tasks."frontend:dev"]
description = "Start frontend dev server"
dir = "components/elero_web/frontend/app"
run = "pnpm dev"

# --- Compile tasks ---

[tasks."compile:lilygo-mqtt"]
description = "Compile lilygo-mqtt firmware"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome compile configs/config.lilygo-mqtt.yaml"

[tasks."compile:lilygo-api"]
description = "Compile lilygo-api firmware"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome compile configs/config.lilygo-api.yaml"

[tasks."compile:lilygo-api-nvs"]
description = "Compile lilygo-api-nvs firmware"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome compile configs/config.lilygo-api-nvs.yaml"

[tasks."compile:heltec-mqtt"]
description = "Compile heltec-mqtt firmware"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome compile configs/config.heltec-mqtt.yaml"

[tasks."compile:all"]
description = "Compile all ESPHome test configs"
depends = ["setup:python", "frontend:build"]
run = """
for cfg in tests/test.esp32-s3-ard.yaml \
           tests/test.esp32-s3-idf.yaml \
           tests/test.esp32-ard.yaml \
           tests/test.esp32-minimal.yaml \
           tests/test.esp32-mqtt.yaml \
           tests/test.esp32-nvs.yaml; do
  echo "==> Compiling $cfg"
  uv run esphome compile "$cfg"
done
"""

# --- Test & lint ---

[tasks.test]
description = "Run C++ unit tests"
run = "cd tests/unit && cmake -B build --fresh && cmake --build build && ctest --test-dir build"

[tasks."test:xml"]
description = "Run C++ unit tests with JUnit XML output"
run = "cd tests/unit && cmake -B build --fresh && cmake --build build && cmake --build build --target test_xml"

[tasks."lint:python"]
description = "Lint Python files with ruff"
depends = ["setup:python"]
run = "uv run ruff check ."

[tasks."lint:frontend"]
description = "Lint and typecheck frontend with oxlint + tsgolint"
depends = ["setup:frontend"]
dir = "components/elero_web/frontend/app"
run = """
pnpm lint
pnpm typecheck
"""

[tasks.lint]
description = "Lint all code (Python + frontend)"
depends = ["lint:python", "lint:frontend"]

[tasks."lint:fix"]
description = "Lint and auto-fix Python files"
depends = ["setup:python"]
run = "uv run ruff check --fix ."

# --- Flash tasks ---
# Default target: lilygo-mqtt via USB

[tasks.erase]
description = "Erase full flash (wipes NVS)"
run = "uvx esptool --port {{vars.usb_port}} erase_flash"

[tasks."flash:lilygo-mqtt"]
description = "Flash lilygo-mqtt via USB"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome run configs/config.lilygo-mqtt.yaml --device {{vars.usb_port}}"

[tasks."flash:lilygo-mqtt:ota"]
description = "Flash lilygo-mqtt via OTA"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome run configs/config.lilygo-mqtt.yaml --device {{vars.device_ip}}"

[tasks."flash:lilygo-api"]
description = "Flash lilygo-api via USB"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome run configs/config.lilygo-api.yaml --device {{vars.usb_port}}"

[tasks."flash:lilygo-api:ota"]
description = "Flash lilygo-api via OTA"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome run configs/config.lilygo-api.yaml --device {{vars.device_ip}}"

[tasks."flash:lilygo-api-nvs"]
description = "Flash lilygo-api-nvs via USB"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome run configs/config.lilygo-api-nvs.yaml --device {{vars.usb_port}}"

[tasks."flash:lilygo-api-nvs:ota"]
description = "Flash lilygo-api-nvs via OTA"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome run configs/config.lilygo-api-nvs.yaml --device {{vars.device_ip}}"

[tasks."flash:heltec-mqtt"]
description = "Flash heltec-mqtt via USB"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome run configs/config.heltec-mqtt.yaml --device {{vars.usb_port}}"

[tasks."flash:heltec-mqtt:ota"]
description = "Flash heltec-mqtt via OTA"
depends = ["setup:python", "frontend:build"]
run = "uv run esphome run configs/config.heltec-mqtt.yaml --device {{vars.device_ip}}"

# --- Composite tasks ---

[tasks.build]
description = "Full build: install deps, build frontend, compile firmware"
depends = ["setup", "compile:lilygo-mqtt"]

[tasks.all]
description = "Full build + lint + unit tests"
depends = ["setup", "lint", "test", "compile:lilygo-mqtt"]

[tasks."deploy:lilygo-mqtt"]
description = "Full build, then flash lilygo-mqtt via USB"
depends = ["build"]
run = "uv run esphome run configs/config.lilygo-mqtt.yaml --device {{vars.usb_port}}"

[tasks."deploy:lilygo-mqtt:ota"]
description = "Full build, then flash lilygo-mqtt via OTA"
depends = ["build"]
run = "uv run esphome run configs/config.lilygo-mqtt.yaml --device {{vars.device_ip}}"

[tasks."deploy:lilygo-mqtt:erase"]
description = "Erase flash, clean build, then compile and flash lilygo-mqtt via USB"
depends = ["erase", "setup", "frontend:build"]
run = """
uv run esphome clean configs/config.lilygo-mqtt.yaml
uv run esphome run configs/config.lilygo-mqtt.yaml --device {{vars.usb_port}}
"""
