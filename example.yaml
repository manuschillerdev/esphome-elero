external_components:
  - source: github://pfriedrich84/esphome-elero

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

elero:
  cs_pin: GPIO5
  gdo0_pin: GPIO26
  freq0: 0xc0
  freq1: 0x71
  freq2: 0x21

cover:
  - platform: elero
    dst_address: 0xa831e5     # Blind address (destination of our commands)
    channel: 4
    src_address: 0xf0d008     # Our emulated remote address (source of our commands)
    name: Schlafzimmer
    open_duration: 25s
    close_duration: 22s

# Light - Elero light receiver (on/off or dimmable)
light:
  - platform: elero
    dst_address: 0xc41a2b     # Light address (destination of our commands)
    channel: 6
    src_address: 0xf0d008     # Our emulated remote address (source of our commands)
    name: "Wohnzimmerlicht"
    # dim_duration: 5s    # Uncomment for brightness/dimming support

# RSSI sensor - reports signal strength for a specific blind
sensor:
  - platform: elero
    dst_address: 0xa831e5     # Blind address to monitor
    name: "Schlafzimmer RSSI"

# Text sensor - reports blind state as text (top, bottom, moving_up, etc.)
text_sensor:
  - platform: elero
    dst_address: 0xa831e5     # Blind address to monitor
    name: "Schlafzimmer Status"

# HTTP server (auto-loaded by elero_web; no default ESPHome UI, only /elero is served)
# Do NOT use web_server: here — it would re-enable the unwanted default UI at /
web_server_base:
  port: 80

elero_web:
  id: elero_web_ui

# Home Assistant switch to enable / disable the web UI at runtime.
# When off, all /elero routes return 503 and no RF state is served.
switch:
  - platform: elero_web
    name: "Elero Web UI"
    id: elero_web_switch
    restore_mode: RESTORE_DEFAULT_ON
