# ESPHome compile test: ESP32 with native API (same CC1101 config as MQTT test)
substitutions:
  spi_clk: GPIO18
  spi_mosi: GPIO23
  spi_miso: GPIO19
  spi_cs: GPIO5
  gdo0_pin: GPIO26

esphome:
  name: test-esp32-api
  friendly_name: Test ESP32 API

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: "test-network"
  password: ""

api:

external_components:
  - source:
      type: local
      path: ../components

spi:
  clk_pin: ${spi_clk}
  mosi_pin: ${spi_mosi}
  miso_pin: ${spi_miso}

elero:
  cs_pin: ${spi_cs}
  gdo0_pin: ${gdo0_pin}

cover:
  - platform: elero
    dst_address: 0xa831e5
    channel: 4
    src_address: 0xf0d008
    name: "Test Cover"
    open_duration: 25s
    close_duration: 22s
    supports_tilt: true

light:
  - platform: elero
    dst_address: 0xc41a2b
    channel: 6
    src_address: 0xf0d008
    name: "Test Light"
    dim_duration: 5s

elero_web:
  port: 80
