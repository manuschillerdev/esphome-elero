# ESPHome compile test: custom frequency (868.95 MHz)
# Verifies non-default frequency registers compile and pass validation
substitutions:
  spi_clk: GPIO18
  spi_mosi: GPIO23
  spi_miso: GPIO19
  spi_cs: GPIO5
  gdo0_pin: GPIO26

esphome:
  name: test-esp32-custom-freq
  friendly_name: Test ESP32 Custom Freq
  platformio_options:
    build_unflags: -std=gnu++11
    build_flags:
      - -std=gnu++2a

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: "test-network"
  password: ""

external_components:
  - source:
      type: local
      path: ../components

spi:
  clk_pin: ${spi_clk}
  mosi_pin: ${spi_mosi}
  miso_pin: ${spi_miso}

elero:
  cs_pin: ${spi_cs}
  gdo0_pin: ${gdo0_pin}
  freq0: 0xC0
  freq1: 0x71
  freq2: 0x21

cover:
  - platform: elero
    dst_address: 0xa831e5
    channel: 4
    src_address: 0xf0d008
    name: "Cover Alt Freq"
    open_duration: 25s
    close_duration: 22s
