# ESPHome compile test: multiple covers with varied config
# Tests poll stagger, tilt support, position tracking on/off
substitutions:
  spi_clk: GPIO18
  spi_mosi: GPIO23
  spi_miso: GPIO19
  spi_cs: GPIO5
  gdo0_pin: GPIO26

esphome:
  name: test-esp32-multi-cover
  friendly_name: Test ESP32 Multi Cover
  platformio_options:
    build_unflags: -std=gnu++11
    build_flags:
      - -std=gnu++2a

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: "test-network"
  password: ""

external_components:
  - source:
      type: local
      path: ../components

spi:
  clk_pin: ${spi_clk}
  mosi_pin: ${spi_mosi}
  miso_pin: ${spi_miso}

elero:
  cs_pin: ${spi_cs}
  gdo0_pin: ${gdo0_pin}

cover:
  # Cover with position tracking + tilt
  - platform: elero
    dst_address: 0xa831e5
    channel: 4
    src_address: 0xf0d008
    name: "Cover Tracked Tilt"
    open_duration: 25s
    close_duration: 22s
    supports_tilt: true
    device_class: blind

  # Cover without position tracking (open/close only)
  - platform: elero
    dst_address: 0xb942f6
    channel: 5
    src_address: 0xf0d008
    name: "Cover Simple"
    auto_sensors: false

  # Cover with poll_interval: never
  - platform: elero
    dst_address: 0xca5307
    channel: 6
    src_address: 0xf0d008
    name: "Cover Awning"
    open_duration: 30s
    close_duration: 28s
    device_class: awning
