# ESPHome compile test: ESP32 with Matter adapter stub
substitutions:
  spi_clk: GPIO18
  spi_mosi: GPIO23
  spi_miso: GPIO19
  spi_cs: GPIO5
  gdo0_pin: GPIO26

esphome:
  name: test-esp32-matter
  friendly_name: Test ESP32 Matter

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: "test-network"
  password: ""

external_components:
  - source:
      type: local
      path: ../components

spi:
  clk_pin: ${spi_clk}
  mosi_pin: ${spi_mosi}
  miso_pin: ${spi_miso}

# Elero hub
elero:
  cs_pin: ${spi_cs}
  gdo0_pin: ${gdo0_pin}

# Matter adapter stub
elero_matter:

# Web UI
elero_web:
  port: 80
