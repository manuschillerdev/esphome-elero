# ESPHome compile test: ESP32 with MQTT mode
substitutions:
  spi_clk: GPIO18
  spi_mosi: GPIO23
  spi_miso: GPIO19
  spi_cs: GPIO5
  gdo0_pin: GPIO26

esphome:
  name: test-esp32-mqtt
  friendly_name: Test ESP32 MQTT

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

wifi:
  ssid: "test-network"
  password: ""

external_components:
  - source:
      type: local
      path: ../components

spi:
  clk_pin: ${spi_clk}
  mosi_pin: ${spi_mosi}
  miso_pin: ${spi_miso}

# MQTT broker (required for elero_mqtt)
mqtt:
  broker: 192.168.1.100

# Elero hub (no YAML covers/lights — devices managed via MQTT)
elero:
  cs_pin: ${spi_cs}
  gdo0_pin: ${gdo0_pin}

# MQTT adapter with NVS persistence
elero_mqtt:
  topic_prefix: elero
  discovery_prefix: homeassistant
  device_name: "Elero Gateway"

# Web UI for RF discovery and device management
elero_web:
  port: 80
